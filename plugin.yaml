name: discord-tools
version: 0.1.0
description: >-
  Read-only Discord channel, thread, and message inspection tools for Hermes
  Discord-facing agents. Reuses the profile's existing DISCORD_BOT_TOKEN and
  only reads content the bot can already access.
author: offendingcommit
kind: standalone
provides_tools:
  - discord_read_channel
  - discord_read_thread
  - discord_get_message
  - discord_read_story
provides_hooks:
  - pre_llm_call
requires_env:
  - name: DISCORD_BOT_TOKEN
    description: Existing Discord bot token loaded by the Hermes gateway. Reused for reads.
    secret: true
  - name: DISCORD_TOKEN
    description: Optional fallback alias for the bot token when running standalone.
    secret: true
  - name: DISCORD_TOOLS_ALLOWED_GUILDS
    description: Optional comma-separated guild IDs allowed for reads.
    secret: false
  - name: DISCORD_TOOLS_STORY_HINTS
    description: Optional inline JSON story hint config for the hint hook.
    secret: false
  - name: DISCORD_TOOLS_STORY_HINTS_JSON
    description: Optional inline JSON or local JSON file path for story hints.
    secret: false
  - name: DISCORD_TOOLS_STORY_THREADS_JSON
    description: >-
      Optional inline JSON (or local JSON file path) of preconfigured story
      threads for discord_read_story, e.g. [{"name":"House of Tea",
      "thread_id":"...","aliases":["bea"]}].
    secret: false
  - name: DISCORD_TOOLS_STORY_THREAD_ID
    description: Optional single story thread ID for discord_read_story when only one is needed.
    secret: false
